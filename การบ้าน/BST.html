<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BST</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #0f172a;
    color: white;
    font-size: larger;
  }

  h1 {
    margin: 20px;
  }

  input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
  }

  .insert { background: #22c55e; color: white; }
  .search { background: #3b82f6; color: white; }
  .clear  { background: #ef4444; color: white; }

  svg {
    width: 100%;
    height: 500px;
    margin-top: 20px;
  }

  circle {
    fill: #1e293b;
    stroke: #38bdf8;
    stroke-width: 2;
  }

  text {
    fill: white;
    font-size: 14px;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  .highlight {
    fill: #facc15;
  }
</style>
</head>

<body>

<h1>Binary Search Tree</h1>

<input type="number" id="value" placeholder="Enter number">
<button class="insert" onclick="insert()">Insert</button>
<button class="clear" onclick="clearTree()">Clear</button>

<svg id="tree"></svg>

<script>
class Node {
  constructor(value) {
    this.value = value;
    this.left = null;
    this.right = null;
    this.x = 0;
    this.y = 0;
  }
}

class BST {
  constructor() {
    this.root = null;
  }

  insert(value) {
    const newNode = new Node(value);

    if (!this.root) {
      this.root = newNode;
      return;
    }

    let current = this.root;

    while (true) {
      if (value < current.value) {
        if (!current.left) {
          current.left = newNode;
          return;
        }
        current = current.left;
      } else {
        if (!current.right) {
          current.right = newNode;
          return;
        }
        current = current.right;
      }
    }
  }

  search(value) {
    let current = this.root;
    let path = [];

    while (current) {
      path.push(current);
      if (value === current.value) return path;
      if (value < current.value) current = current.left;
      else current = current.right;
    }

    return path;
  }
}

const bst = new BST();
const svg = document.getElementById("tree");

function insert() {
  const value = parseInt(document.getElementById("value").value);
  if (isNaN(value)) return;

  bst.insert(value);
  drawTree();
}

function search() {
  const value = parseInt(document.getElementById("value").value);
  if (isNaN(value)) return;

  const path = bst.search(value);
  drawTree(path);
}

function clearTree() {
  bst.root = null;
  svg.innerHTML = "";
}

// 🎨 วาดต้นไม้
function drawTree(highlightPath = []) {
  svg.innerHTML = "";
  const width = svg.clientWidth;

  function setPosition(node, x, y, offset) {
    if (!node) return;

    node.x = x;
    node.y = y;

    setPosition(node.left, x - offset, y + 70, offset / 2);
    setPosition(node.right, x + offset, y + 70, offset / 2);
  }

  setPosition(bst.root, width / 2, 40, width / 4);

  function draw(node) {
    if (!node) return;

    // เส้นเชื่อม
    if (node.left) drawLine(node, node.left);
    if (node.right) drawLine(node, node.right);

    draw(node.left);
    draw(node.right);

    // วาด node
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", node.x);
    circle.setAttribute("cy", node.y);
    circle.setAttribute("r", 20);

    if (highlightPath.includes(node)) {
      circle.classList.add("highlight");
    }

    svg.appendChild(circle);

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", node.x);
    text.setAttribute("y", node.y);
    text.textContent = node.value;

    svg.appendChild(text);
  }

  function drawLine(parent, child) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", parent.x);
    line.setAttribute("y1", parent.y);
    line.setAttribute("x2", child.x);
    line.setAttribute("y2", child.y);
    line.setAttribute("stroke", "#64748b");

    svg.appendChild(line);
  }

  draw(bst.root);
}
</script>

</body>
</html>
