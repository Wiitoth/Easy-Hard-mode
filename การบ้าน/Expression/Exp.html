<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expression</title>
<style>

    body{
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg,#0894b4,#022d38);
        margin:0;
        padding:40px;
    }

    .container{
        max-width:800px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:30px;
    }

    input{
        width:100%;
        padding:10px;
        font-size:16px;
        border-radius:6px;
        border:1px solid #ccc;
    }

    button{
        padding:10px 20px;
        border:none;
        border-radius:6px;
        background:#032129;
        color:white;
        font-size:15px;
        cursor:pointer;
        margin:5px;
    }

    button:hover{
        background:#039ec1;
    }

    .section{
        margin-top:25px;
        padding:15px;
        border-radius:8px;
        background:#f5f7fa;
    }

    .result{
        font-weight:bold;
        color:#333;
    }

    .label{
        font-weight:bold;
    }
</style>
</head>
<body>
<div class="container">
        <h1>Expression</h1>
            <div class="section">
            <label class="label">Insert Expression</label>
            <input id="expression" value="A + ( B - C ^ D ) * E / F**">
    <br><br>
        <button onclick="removeSpace(document.getElementById('expression').value)">Remove Space</button>
        <button onclick="spliteExperssion()">Split Expression</button>
        <button onclick="convertExpression()">Convert Expression</button>
    </div>
    <div class="section">
        <p class="label">Remove Space Result</p>
        <p class="result" id="resultRemoveSpace">...</p>
    </div>
    <div class="section">
        <p class="label">Operators</p>
        <p id="operator" class="result">...</p>
        <p class="label">Operands</p>
        <p id="operand" class="result">...</p>
    </div>
    <div class="section">
        <p class="label">Infix</p>
        <p id="infix" class="result">...</p>
        <p class="label">Prefix</p>
        <p id="prefix" class="result">...</p>
        <p class="label">Postfix</p>
        <p id="postfix" class="result">...</p>
    </div>
</div>
<script>
let exp = "";
function removeSpace(expression){
    let newExpression = "";
    for(let i = 0; i < expression.length ; i++){
        let char = expression.charAt(i);
        if(char != " "){
            newExpression += char;
        }
    }
    exp = newExpression;
    document.getElementById("resultRemoveSpace").innerHTML = newExpression;
    return newExpression;
}
let operand = [];
let operator = [];
function spliteExperssion(){
    operand = [];
    operator = [];
    if(exp.length == 0){
        removeSpace(document.getElementById("expression").value);
    }
    for(let i = 0 ; i < exp.length ; i++){
                if(exp[i] == "*" && exp[i+1] == "*"){
            operator.push("**");
            i++;
            continue;
        }
        let char = exp.charAt(i);
        if(char.match(/[A-Za-z0-9]/)){
            operand.push(char);
        }
        else{
            operator.push(char);
        }
    }
    document.getElementById("operand").innerHTML = operand.join(" , ");
    document.getElementById("operator").innerHTML = operator.join(" , ");
}
function precedence(op){
    if(op == '^') return 4;
    if(op == '**') return 3;
    if(op == '*' || op == '/') return 2;
    if(op == '+' || op == '-') return 1;
    return 0;
}
function infixToPostfix(infix){
    let stack = [];
    let output = "";
    for(let i=0;i<infix.length;i++){
        let char = infix[i];
        if(infix[i] == "*" && infix[i+1] == "*"){
            char = "**";
            i++;
        }
        if(char.match(/[A-Za-z0-9]/)){
            output += char;
        }
        else if(char == '('){
            stack.push(char);
        }
        else if(char == ')'){
            while(stack.length && stack[stack.length-1] != '('){
                output += stack.pop();
            }
            stack.pop();
        }
        else{
            while(stack.length &&
            precedence(char) <= precedence(stack[stack.length-1])){
                output += stack.pop();
            }
            stack.push(char);
        }
    }
    while(stack.length){
        output += stack.pop();
    }
    return output;
}
function infixToPrefix(infix){
    let reversed = infix.split("").reverse().join("");
    reversed = reversed.replace(/\(/g,"temp")
                        .replace(/\)/g,"(")
                        .replace(/temp/g,")");
    let postfix = infixToPostfix(reversed);
    return postfix.split("").reverse().join("");
}
function convertExpression(){
    if(exp.length == 0){
        removeSpace(document.getElementById("expression").value);
    }
    let infix = exp;
    let postfix = infixToPostfix(infix);
    let prefix = infixToPrefix(infix);
    document.getElementById("infix").innerHTML = infix;
    document.getElementById("prefix").innerHTML = prefix;
    document.getElementById("postfix").innerHTML = postfix;
}
</script>
</body>
</html>
