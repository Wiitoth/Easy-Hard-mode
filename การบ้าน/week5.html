<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Linked List UI</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    .box {
        background: white;
        width: 500px;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
        padding: 8px;
        margin: 5px;
        width: 120px;
    }

    button {
        padding: 8px 12px;
        margin: 5px;
        border: none;
        background: #4CAF50;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    .red {
        background: #f44336;
    }

    .blue {
        background: #2196F3;
    }

    .list {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #444;
    }

    .result {
        margin-top: 10px;
        color: #e91e63;
        font-weight: bold;
    }
</style>

</head>

<body>

<h1>📌 Linked List Simulator</h1>

<div class="box">

    <!-- Input Value -->
    <input type="text" id="valueInput" placeholder="Value">

    <!-- Index -->
    <input type="number" id="indexInput" placeholder="Index">

    <br>

    <!-- Buttons -->
    <button onclick="pushValue()">Push</button>
    <button onclick="unshiftValue()">Unshift</button>

    <button class="red" onclick="popValue()">Pop</button>
    <button class="red" onclick="shiftValue()">Shift</button>

    <br>

    <button class="blue" onclick="getValue()">Get</button>
    <button class="blue" onclick="setValue()">Set</button>
    <button class="red" onclick="removeValue()">Remove</button>

    <!-- Display -->
    <div class="list" id="listDisplay"></div>
    <div class="result" id="result"></div>

</div>

<script>

class Node {
    constructor(value) {
        this.value = value;
        this.next = null;
    }
}

class LinkedList {
    constructor() {
        this.head = null;
        this.tail = null;
        this.length = 0;
    }

    push(value) {
        const node = new Node(value);

        if (!this.head) {
            this.head = node;
            this.tail = node;
        } else {
            this.tail.next = node;
            this.tail = node;
        }

        this.length++;
    }

    pop() {
        if (!this.head) return null;

        let current = this.head;
        let prev = current;

        while (current.next) {
            prev = current;
            current = current.next;
        }

        if (this.length === 1) {
            this.head = null;
            this.tail = null;
        } else {
            prev.next = null;
            this.tail = prev;
        }

        this.length--;

        return current.value;
    }

    unshift(value) {
        const node = new Node(value);

        if (!this.head) {
            this.head = node;
            this.tail = node;
        } else {
            node.next = this.head;
            this.head = node;
        }

        this.length++;
    }

    shift() {
        if (!this.head) return null;

        const temp = this.head;
        this.head = this.head.next;

        this.length--;

        if (this.length === 0) this.tail = null;

        return temp.value;
    }

    get(index) {
        if (index < 0 || index >= this.length) return null;

        let current = this.head;

        for (let i = 0; i < index; i++) {
            current = current.next;
        }

        return current.value;
    }

    set(index, value) {
        if (index < 0 || index >= this.length) return false;

        let current = this.head;

        for (let i = 0; i < index; i++) {
            current = current.next;
        }

        current.value = value;
        return true;
    }

    remove(index) {
        if (index < 0 || index >= this.length) return null;

        if (index === 0) return this.shift();
        if (index === this.length - 1) return this.pop();

        let prev = this.head;

        for (let i = 0; i < index - 1; i++) {
            prev = prev.next;
        }

        const removed = prev.next;
        prev.next = removed.next;

        this.length--;

        return removed.value;
    }

    getList() {
        let arr = [];
        let cur = this.head;

        while (cur) {
            arr.push(cur.value);
            cur = cur.next;
        }

        return arr;
    }
}

/* ------------------- UI --------------------- */

const list = new LinkedList();

function updateDisplay() {

    const data = list.getList();

    if (data.length === 0) {
        listDisplay.innerHTML = "List is empty";
        return;
    }

    let text = "";

    data.forEach(v => {
        text += `[ ${v} ] → `;
    });

    text += "null";

    listDisplay.innerHTML = text;
}

function pushValue() {
    const val = valueInput.value;

    if (val === "") return alert("กรุณาใส่ค่า");

    list.push(val);
    updateDisplay();
}

function unshiftValue() {
    const val = valueInput.value;

    if (val === "") return alert("กรุณาใส่ค่า");

    list.unshift(val);
    updateDisplay();
}

function popValue() {
    const v = list.pop();

    result.innerHTML = v !== null ? "Pop: " + v : "List ว่าง";
    updateDisplay();
}

function shiftValue() {
    const v = list.shift();

    result.innerHTML = v !== null ? "Shift: " + v : "List ว่าง";
    updateDisplay();
}

function getValue() {
    const i = indexInput.value;

    const v = list.get(Number(i));

    result.innerHTML = v !== null ? "Get: " + v : "Index ไม่ถูกต้อง";
}

function setValue() {
    const i = indexInput.value;
    const val = valueInput.value;

    if (val === "") return alert("ใส่ Value");

    const ok = list.set(Number(i), val);

    result.innerHTML = ok ? "Set สำเร็จ" : "Index ผิด";
    updateDisplay();
}

function removeValue() {
    const i = indexInput.value;

    const v = list.remove(Number(i));

    result.innerHTML = v !== null ? "Remove: " + v : "Index ผิด";
    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
