<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="content">
        <h1>เพิ่มตัวเลขลงอาร์เรย์</h1>
        <div class="num">
            <label>กรอกตัวเลข:</label>
            <input type="number" id="numberinput">
            <button class="btn-add" onclick="addNumber()">เพิ่ม</button>
        </div>
        <div class="cal">
            <p>ตัวเลขที่เพิ่ม: <span id="numberslist">[]</span></p>
            <button class="btn-cal" onclick="calculate()">คำนวณ</button>
        </div>
        <div class="reset">
            <p>ผลคูณเลขคู่: <span id="evenProduct">-</span></p>
            <p>ผลคูณเลขคี่: <span id="oddProduct">-</span></p>
            <button class="btn-re" onclick="resetData()">รีเซ็ต</button>
        </div>
    </div>
    <script>
        const numbers = []; // เก็บตัวเลข
        function addNumber() {
            const numInput = document.getElementById("numberinput").value;
            const num = parseInt(numInput);
            if (!isNaN(num)) {
                numbers.push(num);
                document.getElementById("numberslist").textContent = numbers.join(", ");
                document.getElementById("numberinput").value = "";
            } else {
                alert("กรุณากรอกตัวเลขที่ถูกต้อง");
            }
        }
        function resetData() { //เคลียตัวเลข
            numbers.length = 0;
            document.getElementById("numberslist").innerText = "[]";
            document.getElementById("evenProduct").innerText = "-";
            document.getElementById("oddProduct").innerText = "-";
            document.getElementById("numberinput").value = "";
        }
        function calculate() { //คำนวน
            let evenProduct = 1;
            let oddProduct = 1;
            let hasEven = false;
            let hasOdd = false;
            for (let i = 0; i < numbers.length; i++) {
                if (numbers[i] % 2 === 0) {
                    evenProduct *= numbers[i];
                    hasEven = true;
                } else {
                    oddProduct *= numbers[i];
                    hasOdd = true;
                }
            }
            document.getElementById("evenProduct").innerText =
                hasEven ? evenProduct : "ไม่มีเลขคู่";
            document.getElementById("oddProduct").innerText =
                hasOdd ? oddProduct : "ไม่มีเลขคี่";
        }
    </script>
</body>
</html>
