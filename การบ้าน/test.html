<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .tree ul {
            position: relative;
            padding-top: 50px;
            padding-right: 10px;
            padding-bottom: 0;
            padding-left: 10px;
            display: flex;
            justify-content: center;
        }
        .tree li {
            display: table-cell; /* Use table-cell for better centering */
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
        }
        .tree li::before, .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 1px solid #ccc;
            width: 50%;
            height: 15px;
        }
        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 1px solid #ccc;
        }
        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:nth-child(2)::after {
            border-left: none;
        }
        .tree li:nth-child(2)::before {
            border-top: 1px solid #ccc;
            border-left: 1px solid #ccc;
        }
        .tree li:first-child::before {
            border-top: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }
        .tree li:first-child::after {
            border-top: none;
        }
        .tree li:last-child::before {
            border-top: none;
        }
        .tree li:last-child::after {
            border-left: 1px solid #ccc;
            border-top: 1px solid #ccc;
        }
        .tree div {
            border: 1px solid #ccc;
            padding: 10px;
            display: inline-block;
            border-radius: 5px;
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <h3>Expression: `a + b * c`</h3>
    <div id="tree-container" class="tree"></div>

    <script src="https://cdnjs.cloudflare.com"></script>
    <script>
        const expression = 'a + b * c';
        const tree = math.parse(expression);
        const container = document.getElementById('tree-container');

        // Recursive function to render the tree nodes into a nested list structure
        function renderTreeNode(node) {
            const nodeDiv = document.createElement('div');
            nodeDiv.textContent = node.isOperatorNode ? node.op : node.value;

            if (node.args && node.args.length > 0) {
                const childrenContainer = document.createElement('ul');
                node.args.forEach(childNode => {
                    const childLi = document.createElement('li');
                    childLi.appendChild(renderTreeNode(childNode));
                    childrenContainer.appendChild(childLi);
                });
                nodeDiv.appendChild(childrenContainer); // Nest children within the parent node's div for complex CSS
            }
            return nodeDiv;
        }

        // A simpler structure for general purpose CSS styling might be better
        function renderTreeSimple(node) {
            let html = `<div>${node.isOperatorNode ? node.op : (node.name || node.value)}</div>`;
            if (node.args && node.args.length > 0) {
                html += '<ul>';
                node.args.forEach(childNode => {
                    html += `<li>${renderTreeSimple(childNode)}</li>`;
                });
                html += '</ul>';
            }
            return html;
        }
        
        container.innerHTML = renderTreeSimple(tree);

    </script>
</body>
</html>
